name: Update GRAC Data

on:
  schedule:
    - cron: '0 0 * * *'  # 매일 자정 (UTC) 실행
  workflow_dispatch:       # 수동 실행 가능

jobs:
  update-data:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests pandas

      - name: Run data collector
        run: python grac_data.py

      - name: Check for changes
        id: check
        run: |
          git diff --quiet train_data.csv && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push if changed
        if: steps.check.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add train_data.csv
          git commit -m "Auto-update train_data.csv [$(date +'%Y-%m-%d')]"
          git push
